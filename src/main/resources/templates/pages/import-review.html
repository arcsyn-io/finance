<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <style>
        .badge-in {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: #10b98133;
            color: #34d399;
        }
        .badge-out {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: #ef444433;
            color: #f87171;
        }
        .amount-in {
            color: #34d399;
            font-weight: 600;
        }
        .amount-out {
            color: #f87171;
            font-weight: 600;
        }
        .import-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
            background: var(--pico-card-background-color);
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .import-info dt {
            font-size: 0.75rem;
            color: var(--pico-muted-color);
            margin-bottom: 0.25rem;
        }
        .import-info dd {
            margin: 0;
            font-weight: 600;
        }
        #import-rows td {
            vertical-align: middle;
        }
        #import-rows input,
        #import-rows select,
        #import-rows textarea {
            margin: 0;
        }
        #import-rows textarea {
            field-sizing: content;
            resize: none;
            min-height: unset;
            max-width: 400px;
        }
        #import-rows tr.selected {
            background: var(--pico-primary-background);
        }
        #import-rows tr.import-row-incomplete,
        #import-rows tr.import-row-incomplete td {
            --import-row-incomplete-bg: var(--pico-secondary-background);
            --import-row-incomplete-focus-bg: color-mix(in srgb, var(--pico-secondary-background) 78%, var(--pico-primary) 22%);
            background: var(--import-row-incomplete-bg);
            transition: background-color 120ms ease, box-shadow 120ms ease;
        }
        #import-rows tr.import-row-incomplete td:first-child {
            border-left: 3px solid var(--pico-primary);
        }
        #import-rows tr.import-row-incomplete.selected,
        #import-rows tr.import-row-incomplete.selected td {
            background: color-mix(in srgb, var(--pico-secondary-background) 72%, var(--pico-primary) 28%);
        }
        #import-rows tr.import-row-incomplete:focus-within,
        #import-rows tr.import-row-incomplete:focus-within td {
            background: var(--import-row-incomplete-focus-bg);
        }
        #import-rows tr.import-row-incomplete:focus-within td:first-child {
            box-shadow: inset 4px 0 0 var(--pico-primary);
        }
        .batch-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: var(--pico-primary-background);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .batch-actions.hidden {
            display: none;
        }
        .batch-actions select {
            margin: 0;
            width: auto;
            min-width: 150px;
        }
        .batch-actions label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            font-size: 0.875rem;
        }
        .row-checkbox {
            width: 1.25rem;
            height: 1.25rem;
            margin: 0;
        }
        .import-list-tools {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .import-list-tools button {
            margin: 0;
            width: auto;
        }
        .import-list-summary {
            color: var(--pico-muted-color);
            font-size: 0.875rem;
        }
    </style>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h1 style="margin-bottom: 0;">Revisar Importacao</h1>
            <p style="margin: 0;"><small>Revise e edite os lancamentos antes de confirmar</small></p>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="outline secondary"
                    hx-delete="/imports/{id}(id=${importRequest.id})"
                    th:attr="hx-delete=@{/imports/{id}(id=${importRequest.id})}"
                    hx-confirm="Tem certeza que deseja cancelar esta importacao?">
                Cancelar
            </button>
            <button hx-post="/imports/{id}/confirm(id=${importRequest.id})"
                    th:attr="hx-post=@{/imports/{id}/confirm(id=${importRequest.id})}"
                    hx-target="#importReviewMessage"
                    hx-swap="innerHTML">
                <i class="fa-solid fa-check"></i>
                Confirmar Importacao
            </button>
        </div>
    </header>

    <div id="importReviewMessage" th:fragment="message">
        <article th:if="${errorMessage != null}" style="border-left: 4px solid var(--pico-del-color);">
            <strong>Erro ao confirmar importacao</strong>
            <p th:text="${errorMessage}" style="margin-bottom: 0;">Erro</p>
        </article>
    </div>

    <dl class="import-info">
        <div>
            <dt>Carteira padrao</dt>
            <dd th:text="${importRequest.walletName != null ? importRequest.walletName : 'Nenhuma'}">Nubank</dd>
        </div>
        <div>
            <dt>Categoria padrao</dt>
            <dd th:text="${importRequest.categoryName != null ? importRequest.categoryName : 'Nenhuma'}">Alimentacao</dd>
        </div>
        <div>
            <dt>Natureza padrao</dt>
            <dd th:text="${importRequest.nature != null ? (importRequest.nature.name() == 'OPERATIONAL' ? 'Operacional' : 'Patrimonial') : 'Nenhuma'}">Operacional</dd>
        </div>
        <div>
            <dt>Evento Economico padrao</dt>
            <dd th:text="${importRequest.economicEvent != null ? (importRequest.economicEvent.name() == 'INCOME' ? 'Renda' : importRequest.economicEvent.name() == 'CAPITAL_INCOME' ? 'Renda de Capital' : importRequest.economicEvent.name() == 'CONSUMPTION' ? 'Consumo' : importRequest.economicEvent.name() == 'INVESTMENT' ? 'Investimento' : importRequest.economicEvent.name() == 'DIVESTMENT' ? 'Desinvestimento' : importRequest.economicEvent.name() == 'LIQUIDATION' ? 'Liquidação' : importRequest.economicEvent.name() == 'TRANSFER' ? 'Transferência' : importRequest.economicEvent.name() == 'ADJUSTMENT' ? 'Ajuste' : importRequest.economicEvent.name() == 'LOSS' ? 'Perda' : 'Saldo Inicial') : 'Inferir auto.'}">Inferir auto.</dd>
        </div>
        <div>
            <dt>Total de lancamentos</dt>
            <dd th:text="${#lists.size(importRequest.rows)}">0</dd>
        </div>
    </dl>

    <div class="batch-actions hidden" id="batchActions">
        <span id="selectedCount">0 selecionados</span>
        <label>
            Carteira:
            <select id="batchWallet">
                <option value="">-- Manter --</option>
                <option value="__clear__">Usar padrao</option>
                <option th:each="w : ${wallets}" th:value="${w.id}" th:text="${w.name}"></option>
            </select>
        </label>
        <label>
            Categoria:
            <th:block th:replace="~{fragments/category-batch-select :: batchWithDefault(categories=${categories})}"/>
        </label>
        <label>
            Natureza:
            <select id="batchNature">
                <option value="">-- Manter --</option>
                <option value="__clear__">Usar padrao</option>
                <option th:each="n : ${natures}" th:value="${n.name()}" th:text="${n.name() == 'OPERATIONAL' ? 'Operacional' : 'Patrimonial'}"></option>
            </select>
        </label>
        <label>
            Evento:
            <select id="batchEconomicEvent">
                <option value="">-- Manter --</option>
                <option value="__clear__">Inferir auto.</option>
                <option th:each="ev : ${economicEvents}" th:value="${ev.name()}" th:text="${ev.name() == 'INCOME' ? 'Renda' : ev.name() == 'CAPITAL_INCOME' ? 'Renda de Capital' : ev.name() == 'CONSUMPTION' ? 'Consumo' : ev.name() == 'INVESTMENT' ? 'Investimento' : ev.name() == 'DIVESTMENT' ? 'Desinvestimento' : ev.name() == 'LIQUIDATION' ? 'Liquidação' : ev.name() == 'TRANSFER' ? 'Transferência' : ev.name() == 'ADJUSTMENT' ? 'Ajuste' : ev.name() == 'LOSS' ? 'Perda' : 'Saldo Inicial'}"></option>
            </select>
        </label>
        <button type="button" onclick="applyBatchChanges()">Aplicar</button>
        <button type="button" class="outline secondary" style="color: var(--pico-del-color);" onclick="deleteBatchRows()">
            <i class="fa-solid fa-trash"></i> Deletar selecionados
        </button>
        <button type="button" class="outline" onclick="clearSelection()">Limpar</button>
    </div>

    <div class="import-list-tools">
        <button type="button" class="outline secondary" id="groupImportRowsBtn" onclick="toggleImportRowGrouping()">
            <i class="fa-solid fa-layer-group"></i>
            Agrupar pendentes
        </button>
        <span class="import-list-summary" id="importCompletionSummary"></span>
    </div>

    <figure>
        <table>
            <thead>
                <tr>
                    <th style="width: 2.5rem;"><input type="checkbox" class="row-checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)"></th>
                    <th>Data</th>
                    <th>Descricao</th>
                    <th>Carteira</th>
                    <th>Categoria</th>
                    <th>Natureza</th>
                    <th>Evento</th>
                    <th style="text-align: right;">Valor</th>
                    <th style="text-align: right;">Acoes</th>
                </tr>
            </thead>
            <tbody id="import-rows">
                <th:block th:each="row : ${importRequest.rows}">
                    <tr th:replace="~{fragments/import-row :: row(row=${row}, importRequest=${importRequest}, wallets=${wallets}, categories=${categories}, natures=${natures}, economicEvents=${economicEvents})}"></tr>
                </th:block>
                <tr th:if="${#lists.isEmpty(importRequest.rows)}">
                    <td colspan="9" style="text-align: center; padding: 2rem;">
                        Nenhum lancamento para importar.
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>

    <script th:inline="javascript">
        var importId = [[${importRequest.id}]];
        var importRowsGrouped = false;
        var importDefaults = {
            walletId: [[${importRequest.walletId != null}]],
            categoryId: [[${importRequest.categoryId != null}]],
            nature: [[${importRequest.nature != null}]]
        };
        var lastImportRangeCheckbox = null;

        function getImportRows() {
            return Array.from(document.querySelectorAll('#import-rows tr[id^="row-"]'));
        }

        function initializeImportRows() {
            getImportRows().forEach(function(row, index) {
                if (!row.dataset.originalIndex) {
                    row.dataset.originalIndex = index.toString();
                }
                refreshImportRowState(row);
            });
            updateImportCompletionSummary();
        }

        function rowFieldValue(row, field) {
            var input = row.querySelector('[data-import-field="' + field + '"]');
            return input ? input.value : '';
        }

        function isImportRowIncomplete(row) {
            return (!importDefaults.walletId && !rowFieldValue(row, 'walletId')) ||
                (!importDefaults.categoryId && !rowFieldValue(row, 'categoryId')) ||
                (!importDefaults.nature && !rowFieldValue(row, 'nature'));
        }

        function refreshImportRowState(row) {
            row.classList.toggle('import-row-incomplete', isImportRowIncomplete(row));
        }

        function updateImportCompletionSummary() {
            var rows = getImportRows();
            var pending = rows.filter(isImportRowIncomplete).length;
            var complete = rows.length - pending;
            var summary = document.getElementById('importCompletionSummary');
            if (summary) {
                summary.textContent = complete + ' completo(s), ' + pending + ' pendente(s)';
            }
        }

        function sortImportRows() {
            var tbody = document.getElementById('import-rows');
            var rows = getImportRows();

            rows.sort(function(a, b) {
                if (importRowsGrouped) {
                    var pendingDiff = Number(isImportRowIncomplete(b)) - Number(isImportRowIncomplete(a));
                    if (pendingDiff !== 0) return pendingDiff;
                }
                return Number(a.dataset.originalIndex) - Number(b.dataset.originalIndex);
            });

            rows.forEach(function(row) {
                tbody.appendChild(row);
            });
        }

        function toggleImportRowGrouping() {
            importRowsGrouped = !importRowsGrouped;
            var button = document.getElementById('groupImportRowsBtn');
            if (button) {
                button.innerHTML = importRowsGrouped
                    ? '<i class="fa-solid fa-arrow-down-short-wide"></i> Ordem original'
                    : '<i class="fa-solid fa-layer-group"></i> Agrupar pendentes';
            }
            sortImportRows();
        }

        function refreshImportRowsView(options) {
            var shouldSort = !options || options.sort !== false;
            getImportRows().forEach(refreshImportRowState);
            updateImportCompletionSummary();
            if (shouldSort && importRowsGrouped) {
                sortImportRows();
            }
        }

        function setImportRowSelected(checkbox, selected) {
            checkbox.checked = selected;
            checkbox.closest('tr').classList.toggle('selected', selected);
        }

        function toggleFocusedImportRowSelection(activeElement) {
            var row = activeElement.closest('#import-rows tr[id^="row-"]');
            if (!row) return;

            var checkbox = row.querySelector('.row-checkbox');
            if (!checkbox) return;

            setImportRowSelected(checkbox, !checkbox.checked);
            lastImportRangeCheckbox = checkbox;
            updateBatchActions();
        }

        function selectImportCheckboxRange(anchorCheckbox, targetCheckbox) {
            var checkboxes = Array.from(document.querySelectorAll('#import-rows tr input.row-checkbox'));
            var anchorIndex = checkboxes.indexOf(anchorCheckbox);
            var targetIndex = checkboxes.indexOf(targetCheckbox);
            if (anchorIndex === -1 || targetIndex === -1) return false;

            var start = Math.min(anchorIndex, targetIndex);
            var end = Math.max(anchorIndex, targetIndex);
            var selected = targetCheckbox.checked;

            checkboxes.slice(start, end + 1).forEach(function(checkbox) {
                setImportRowSelected(checkbox, selected);
            });
            updateBatchActions();
            return true;
        }

        function navigableImportFieldSelector(field) {
            return field
                ? '[data-import-field="' + field + '"]'
                : '.row-checkbox';
        }

        function focusImportRowField(row, selector) {
            var target = row.querySelector(selector);
            if (!target) return false;

            target.focus();
            if (target.tagName === 'TEXTAREA') {
                target.select();
            }
            target.scrollIntoView({ block: 'nearest', inline: 'nearest' });
            return true;
        }

        function navigateImportRowFocus(currentField, direction) {
            var currentRow = currentField.closest('#import-rows tr[id^="row-"]');
            if (!currentRow) return;

            var rows = getImportRows();
            var currentIndex = rows.indexOf(currentRow);
            var nextRow = rows[currentIndex + direction];
            if (!nextRow) return;

            var selector = navigableImportFieldSelector(currentField.dataset.importField);
            focusImportRowField(nextRow, selector);
        }

        function getNavigableImportFields() {
            return Array.from(document.querySelectorAll(
                '#import-rows tr[id^="row-"] .row-checkbox, #import-rows tr[id^="row-"] [data-import-field]'
            ));
        }

        function navigateImportField(currentField, direction) {
            var fields = getNavigableImportFields();
            var currentIndex = fields.indexOf(currentField);
            var nextField = fields[currentIndex + direction];
            if (!nextField) return;

            nextField.focus();
            if (nextField.tagName === 'TEXTAREA') {
                nextField.select();
            }
            nextField.scrollIntoView({ block: 'nearest', inline: 'nearest' });
        }

        function updateBatchActions() {
            var selected = document.querySelectorAll('#import-rows tr input.row-checkbox:checked');
            var batchActions = document.getElementById('batchActions');
            var countSpan = document.getElementById('selectedCount');
            if (selected.length > 0) {
                batchActions.classList.remove('hidden');
                countSpan.textContent = selected.length + ' selecionado' + (selected.length > 1 ? 's' : '');
            } else {
                batchActions.classList.add('hidden');
            }
            document.getElementById('selectAll').checked =
                selected.length === document.querySelectorAll('#import-rows tr input.row-checkbox').length && selected.length > 0;
        }

        function toggleSelectAll(checked) {
            document.querySelectorAll('#import-rows tr input.row-checkbox').forEach(function(cb) {
                cb.checked = checked;
                cb.closest('tr').classList.toggle('selected', checked);
            });
            updateBatchActions();
        }

        function clearSelection() {
            document.querySelectorAll('#import-rows tr input.row-checkbox').forEach(function(cb) {
                cb.checked = false;
                cb.closest('tr').classList.remove('selected');
            });
            document.getElementById('selectAll').checked = false;
            document.getElementById('batchWallet').value = '';
            document.getElementById('batchCategory').value = '';
            document.getElementById('batchNature').value = '';
            document.getElementById('batchEconomicEvent').value = '';
            updateBatchActions();
        }

        function applyBatchChanges() {
            var selected = document.querySelectorAll('#import-rows tr input.row-checkbox:checked');
            if (selected.length === 0) return;

            var walletValue = document.getElementById('batchWallet').value;
            var categoryValue = document.getElementById('batchCategory').value;
            var natureValue = document.getElementById('batchNature').value;
            var economicEventValue = document.getElementById('batchEconomicEvent').value;

            if (!walletValue && !categoryValue && !natureValue && !economicEventValue) {
                alert('Selecione pelo menos um campo para alterar');
                return;
            }

            var rowIds = [];
            selected.forEach(function(cb) {
                rowIds.push(cb.closest('tr').id.replace('row-', ''));
            });

            var data = {
                rowIds: rowIds,
                walletId: walletValue === '__clear__' ? '' : walletValue,
                categoryId: categoryValue === '__clear__' ? '' : categoryValue,
                nature: natureValue === '__clear__' ? '' : natureValue,
                economicEvent: economicEventValue === '__clear__' ? '' : economicEventValue
            };

            fetch('/imports/' + importId + '/rows/batch', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                }
            }).then(function(response) {
                if (response.ok) {
                    // Atualizar os selects nas linhas
                    selected.forEach(function(cb) {
                        var row = cb.closest('tr');
                        if (walletValue) row.querySelector('[data-import-field="walletId"]').value = walletValue === '__clear__' ? '' : walletValue;
                        if (categoryValue) row.querySelector('[data-import-field="categoryId"]').value = categoryValue === '__clear__' ? '' : categoryValue;
                        if (natureValue) row.querySelector('[data-import-field="nature"]').value = natureValue === '__clear__' ? '' : natureValue;
                        if (economicEventValue) row.querySelector('[data-import-field="economicEvent"]').value = economicEventValue === '__clear__' ? '' : economicEventValue;
                    });
                    refreshImportRowsView();
                    clearSelection();
                }
            });
        }

        function deleteBatchRows() {
            var selected = document.querySelectorAll('#import-rows tr input.row-checkbox:checked');
            if (selected.length === 0) return;

            if (!confirm('Deletar ' + selected.length + ' lançamento(s) selecionado(s)?')) return;

            var rowIds = [];
            var rows = [];
            selected.forEach(function(cb) {
                var row = cb.closest('tr');
                rowIds.push(parseInt(row.id.replace('row-', '')));
                rows.push(row);
            });

            fetch('/imports/' + importId + '/rows/batch', {
                method: 'DELETE',
                body: JSON.stringify({ rowIds: rowIds }),
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                }
            }).then(function(response) {
                if (response.ok) {
                    rows.forEach(function(row) { row.remove(); });
                    document.getElementById('selectAll').checked = false;
                    refreshImportRowsView();
                    updateBatchActions();
                }
            });
        }

        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('row-checkbox') && e.target.id !== 'selectAll') {
                e.target.closest('tr').classList.toggle('selected', e.target.checked);
                updateBatchActions();
            } else if (e.target.matches('[data-import-field="walletId"], [data-import-field="categoryId"], [data-import-field="nature"]')) {
                refreshImportRowsView({ sort: false });
            }
        });

        document.addEventListener('focusout', function(e) {
            var row = e.target.closest('#import-rows tr[id^="row-"]');
            if (!row) return;

            setTimeout(function() {
                if (!row.contains(document.activeElement)) {
                    refreshImportRowsView();
                }
            }, 0);
        });

        document.addEventListener('click', function(e) {
            if (!e.target.matches('#import-rows tr input.row-checkbox')) return;

            if (e.shiftKey && lastImportRangeCheckbox) {
                selectImportCheckboxRange(lastImportRangeCheckbox, e.target);
            }
            lastImportRangeCheckbox = e.target;
        });

        document.addEventListener('keydown', function(e) {
            if (!e.altKey || e.ctrlKey || e.shiftKey || e.metaKey) return;

            var key = e.key.toLowerCase();
            if (key !== 'n' && key !== 'p' && key !== 'f' && key !== 'b' && key !== ' ') return;

            var target = e.target;
            if (!target.matches('#import-rows [data-import-field], #import-rows .row-checkbox')) return;

            e.preventDefault();
            if (key === ' ') {
                toggleFocusedImportRowSelection(target);
            } else if (key === 'f' || key === 'b') {
                navigateImportField(target, key === 'f' ? 1 : -1);
            } else {
                navigateImportRowFocus(target, key === 'n' ? 1 : -1);
            }
        });

        document.addEventListener('DOMContentLoaded', initializeImportRows);
    </script>
</div>
</body>
</html>
