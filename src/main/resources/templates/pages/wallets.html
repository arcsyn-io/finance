<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <style>
        .sidebar-modal {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            max-width: 100%;
            height: 100vh;
            background: var(--pico-card-background-color);
            border-left: 1px solid var(--pico-muted-border-color);
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .sidebar-modal.open {
            right: 0;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
        .sidebar-overlay.open {
            display: block;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
        }
        .sidebar-header h2 {
            margin: 0;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--pico-muted-color);
            padding: 0;
            width: auto;
        }
        .close-btn:hover {
            color: var(--pico-color);
        }
        .actions {
            display: flex;
            gap: 0.5rem;
        }
        .actions button {
            padding: 0.25rem 0.5rem;
            margin: 0;
            width: auto;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            color: var(--pico-muted-color);
            width: auto;
            margin: 0;
        }
        .icon-btn:hover {
            color: var(--pico-primary);
        }
        .icon-btn.danger:hover {
            color: var(--pico-del-color);
        }
        .search-bar {
            display: flex;
            gap: 1rem;
            align-items: end;
            margin-bottom: 1rem;
        }
        .search-bar input {
            margin-bottom: 0;
        }
        .search-bar button {
            margin-bottom: 0;
            width: auto;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .pagination button {
            width: auto;
            padding: 0.5rem 1rem;
            margin: 0;
        }
        .pagination .active {
            background: var(--pico-primary);
            color: var(--pico-primary-inverse);
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-bank { background: var(--pico-primary-background); color: var(--pico-primary); }
        .badge-credit { background: #7c3aed33; color: #a78bfa; }
        .badge-crypto { background: #f59e0b33; color: #fbbf24; }
        .badge-investment { background: #10b98133; color: #34d399; }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            min-width: 300px;
        }
        .toast-success {
            background: #10b981;
            color: white;
        }
        .toast-error {
            background: var(--pico-del-color);
            color: white;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h1 style="margin-bottom: 0;">Carteiras</h1>
            <p style="margin: 0;"><small>Gerencie suas carteiras e contas</small></p>
        </div>
        <button onclick="openSidebar()">+ Nova Carteira</button>
    </header>

    <div class="search-bar">
        <input type="search" placeholder="Buscar carteira..." style="flex: 1;">
        <button class="outline">Buscar</button>
    </div>

    <figure>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Saldo</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr>

                    <td><span class="badge badge-bank">Conta Corrente</span></td>
                    <td>R$ 1.250,00</td>
                    <td>
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" title="Visualizar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>

                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn danger" title="Excluir">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><strong>Cartão Itaú</strong></td>
                    <td><span class="badge badge-credit">Cartão de Crédito</span></td>
                    <td style="color: var(--pico-del-color);">-R$ 450,00</td>
                    <td>
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" title="Visualizar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <button class="icon-btn" title="Editar" onclick="openSidebar()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn danger" title="Excluir">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><strong>Bitcoin</strong></td>
                    <td><span class="badge badge-crypto">Criptomoeda</span></td>
                    <td>R$ 5.320,00</td>
                    <td>
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" title="Visualizar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <button class="icon-btn" title="Editar" onclick="openSidebar()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn danger" title="Excluir">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><strong>Ações - Petrobras</strong></td>
                    <td><span class="badge badge-investment">Investimento</span></td>
                    <td>R$ 12.800,00</td>
                    <td>
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" title="Visualizar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <button class="icon-btn" title="Editar" onclick="openSidebar()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn danger" title="Excluir">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td><strong>FGTS</strong></td>
                    <td><span class="badge badge-bank">Conta Corrente</span></td>
                    <td>R$ 8.500,00</td>
                    <td>
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" title="Visualizar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                            <button class="icon-btn" title="Editar" onclick="openSidebar()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="icon-btn danger" title="Excluir">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>

    <div class="pagination">
        <button class="outline">«</button>
        <button class="active">1</button>
        <button class="outline">2</button>
        <button class="outline">3</button>
        <button class="outline">»</button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Sidebar Modal -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar-modal" id="sidebarModal">
        <div class="sidebar-header">
            <h2>Nova Carteira</h2>
            <button class="close-btn" onclick="closeSidebar()">×</button>
        </div>
        <form id="walletForm" onsubmit="handleSave(event)">
            <label for="nome">
                Nome
                <input type="text" id="nome" name="nome" placeholder="Ex: Nubank, Bitcoin..." required>
            </label>

            <label for="tipo">
                Tipo
                <select id="tipo" name="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="CHECKING_ACCOUNT">Conta Corrente</option>
                    <option value="CREDIT_CARD">Cartão de Crédito</option>
                    <option value="CRYPTO">Criptomoeda</option>
                    <option value="INVESTMENT">Investimento</option>
                    <option value="CASH">Dinheiro</option>
                    <option value="OTHER">Outro</option>
                </select>
            </label>

            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                <button type="button" class="outline" onclick="closeSidebar()" style="flex: 1;">Cancelar</button>
                <button type="submit" style="flex: 1;">Salvar</button>
            </div>
        </form>
    </div>

    <script>
        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('open');
            document.getElementById('sidebarModal').classList.add('open');
        }

        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('open');
            document.getElementById('sidebarModal').classList.remove('open');
            document.getElementById('walletForm').reset();
        }

        function showToast(message, type = 'success') {
            var container = document.getElementById('toastContainer');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.innerHTML = (type === 'success'
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>'
            ) + '<span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function handleSave(event) {
            event.preventDefault();
            closeSidebar();
            showToast('Carteira salva com sucesso!', 'success');
        }
    </script>
</div>
</body>
</html>
