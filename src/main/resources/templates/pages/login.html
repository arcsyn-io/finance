<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .text-center {
            text-align: center;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <article class="auth-card">
            <header class="text-center">
                <h1>Finance</h1>
                <p><small>Entre na sua conta</small></p>
            </header>

            <div th:if="${param.error}">
                <article style="border-left: 4px solid var(--pico-del-color); margin-bottom: 1rem;">
                    <p>Username ou senha incorretos</p>
                </article>
            </div>

            <div th:if="${successMessage}">
                <article style="border-left: 4px solid var(--pico-ins-color); margin-bottom: 1rem;">
                    <p th:text="${successMessage}">Sucesso</p>
                </article>
            </div>

            <div th:if="${param.logout}">
                <article style="border-left: 4px solid var(--pico-ins-color); margin-bottom: 1rem;">
                    <p>Logout realizado com sucesso</p>
                </article>
            </div>

            <form th:action="@{/login}" method="post">
                <label for="username">
                    Username
                    <input type="text" id="username" name="username" placeholder="seu_username" required>
                </label>

                <label for="password">
                    Senha
                    <input type="password" id="password" name="password" placeholder="********" required>
                </label>

                <div class="flex-between">
                    <label>
                        <input type="checkbox" name="remember-me">
                        Manter conectado
                    </label>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <footer class="text-center">
                <p><small>Ainda não tem conta? <a th:href="@{/signup}">Criar conta</a></small></p>
            </footer>
        </article>
    </div>
</body>
</html>
