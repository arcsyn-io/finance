<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Finance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <article class="auth-card">
            <header class="text-center">
                <h1>Finance</h1>
                <p><small>Crie sua conta</small></p>
            </header>

            <div th:if="${error}">
                <article style="border-left: 4px solid var(--pico-del-color); margin-bottom: 1rem;">
                    <p th:text="${error}">Erro</p>
                </article>
            </div>

            <form th:action="@{/signup}" method="post">
                <label for="username">
                    Username
                    <input type="text" id="username" name="username" placeholder="seu_username" th:value="${username}" required>
                </label>

                <label for="password">
                    Senha
                    <input type="password" id="password" name="password" placeholder="********" required>
                </label>

                <label for="confirmationPassword">
                    Confirmar Senha
                    <input type="password" id="confirmationPassword" name="confirmationPassword" placeholder="********" required>
                </label>

                <button type="submit">Criar Conta</button>
            </form>

            <footer class="text-center">
                <p><small>Já tem uma conta? <a th:href="@{/login}">Entrar</a></small></p>
            </footer>
        </article>
    </div>
</body>
</html>
