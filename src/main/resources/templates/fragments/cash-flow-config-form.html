<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="form(month, monthLabel, openingBalance, minimumCash)">
    <div class="sidebar-header">
        <h2>Configuração</h2>
        <button class="sidebar-close" onclick="closeSidebar()" type="button">&times;</button>
    </div>

    <p style="margin-bottom: 1.5rem; opacity: 0.8;">
        <i class="fa-solid fa-calendar"></i>
        <span th:text="${monthLabel}">Janeiro 2024</span>
    </p>

    <form action="/cash-flow/config"
          method="post"
          hx-post="/cash-flow/config"
          hx-target="#sidebarContent"
          hx-swap="innerHTML">

        <input type="hidden" name="month" th:value="${month}">

        <label for="openingBalance">
            Saldo de Caixa Inicial (R$)
            <input type="text"
                   id="openingBalance"
                   name="openingBalance"
                   th:value="${openingBalance}"
                   placeholder="Ex: 5000,00"
                   inputmode="decimal"
                   autofocus>
            <small>Saldo disponível no início do mês</small>
        </label>

        <label for="minimumCash">
            Caixa Mínimo (R$)
            <input type="text"
                   id="minimumCash"
                   name="minimumCash"
                   th:value="${minimumCash}"
                   placeholder="Ex: 2000,00"
                   inputmode="decimal">
            <small>Limite mínimo de segurança do caixa</small>
        </label>

        <label class="toggle" style="margin-top: 1rem;">
            <input type="checkbox" name="applyToFollowingMonths" value="true">
            <span class="toggle-switch"></span>
            <span class="toggle-label">Aplicar nos meses seguintes</span>
        </label>

        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
            <button type="button" class="outline secondary" onclick="closeSidebar()" style="flex: 1;">
                Cancelar
            </button>
            <button type="submit" style="flex: 1;">
                Salvar
            </button>
        </div>
    </form>
</div>
</body>
</html>
