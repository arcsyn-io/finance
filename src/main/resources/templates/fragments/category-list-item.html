<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<li th:fragment="item(category)" class="category-item" th:id="'category-item-' + ${category.id}"
    th:classappend="${!category.active} ? 'inactive' : ''">
    <span class="category-name" th:text="${category.name}">Alimentação</span>
    <div class="category-actions">
        <button class="icon-btn"
                title="Editar"
                th:attr="hx-get=@{/categories/{id}/edit(id=${category.id})}"
                hx-target="#sidebarContent"
                hx-swap="innerHTML">
            <i class="fa-solid fa-pen-to-square"></i>
        </button>
        <button th:if="${category.active}"
                class="icon-btn icon-btn-danger"
                title="Desativar"
                th:attr="hx-post=@{/categories/{id}/deactivate(id=${category.id})}"
                hx-target="closest li"
                hx-swap="outerHTML">
            <i class="fa-solid fa-trash"></i>
        </button>
        <button th:unless="${category.active}"
                class="icon-btn icon-btn-success"
                title="Ativar"
                th:attr="hx-post=@{/categories/{id}/activate(id=${category.id})}"
                hx-target="closest li"
                hx-swap="outerHTML">
            <i class="fa-solid fa-rotate-left"></i>
        </button>
    </div>
</li>

<li th:fragment="empty" class="category-item">
    <span class="category-name" style="color: var(--pico-muted-color);">Erro ao processar categoria</span>
</li>
</body>
</html>
