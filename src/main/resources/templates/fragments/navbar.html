<!DOCTYPE html>

<nav th:fragment="navbar" class="bg-gray-800 border-b border-gray-700">
    <div class="container mx-auto px-4">

                </a>
                <a th:href="@{/transactions}" class="text-gray-300 hover:text-white transition-colors">
