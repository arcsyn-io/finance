<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="modal" id="linkModalContent">
    <style>
        .link-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .link-modal {
            background: var(--pico-card-background-color);
            border-radius: 0.5rem;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .link-modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .link-modal-header h3 {
            margin: 0;
        }
        .link-modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        .link-modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--pico-muted-border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .source-entry {
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        .source-entry-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.5rem;
        }
        .source-entry-info dt {
            font-size: 0.75rem;
            color: var(--pico-muted-color);
        }
        .source-entry-info dd {
            margin: 0;
            font-weight: 600;
        }
        .link-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .link-filters label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            font-size: 0.875rem;
        }
        .link-filters input[type="checkbox"] {
            margin: 0;
            width: auto;
        }
        .link-filters select {
            margin: 0;
            width: auto;
            min-width: 150px;
        }
        .candidates-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .candidate-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border: 1px solid var(--pico-muted-border-color);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .candidate-item:hover {
            background: var(--pico-primary-background);
        }
        .candidate-item.selected {
            background: var(--pico-primary-background);
            border-color: var(--pico-primary);
        }
        .candidate-item input[type="radio"] {
            margin: 0;
        }
        .candidate-info {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 0.5rem;
            align-items: center;
        }
        .candidate-desc {
            font-weight: 500;
        }
        .candidate-wallet {
            color: var(--pico-muted-color);
            font-size: 0.875rem;
        }
        .candidate-amount {
            font-weight: 600;
            text-align: right;
        }
        .amount-in { color: #34d399; }
        .amount-out { color: #f87171; }
        .no-candidates {
            text-align: center;
            padding: 2rem;
            color: var(--pico-muted-color);
        }
        .link-error {
            background: #ef444433;
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
    </style>

    <div class="link-modal-overlay" onclick="if(event.target === this) closeLinkModal()">
        <div class="link-modal">
            <div class="link-modal-header">
                <h3>Vincular como Transferencia</h3>
                <button type="button" class="icon-btn" onclick="closeLinkModal()" title="Fechar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="link-modal-body">
                <div id="linkError"></div>

                <div class="source-entry">
                    <small style="color: var(--pico-muted-color);">Lancamento selecionado:</small>
                    <dl class="source-entry-info">
                        <div>
                            <dt>Data</dt>
                            <dd th:text="${#temporals.format(entry.occurredAt, 'dd/MM/yyyy')}">01/01/2024</dd>
                        </div>
                        <div>
                            <dt>Carteira</dt>
                            <dd th:text="${entry.walletName}">Nubank</dd>
                        </div>
                        <div>
                            <dt>Valor</dt>
                            <dd th:class="${entry.direction.name() == 'IN' ? 'amount-in' : 'amount-out'}"
                                th:text="${(entry.direction.name() == 'IN' ? '+' : '-') + 'R$ ' + #numbers.formatDecimal(entry.amount / 100.0, 1, 'POINT', 2, 'COMMA')}">
                                R$ 100,00
                            </dd>
                        </div>
                        <div style="grid-column: span 3;">
                            <dt>Descricao</dt>
                            <dd th:text="${entry.description ?: '-'}">Descricao</dd>
                        </div>
                    </dl>
                </div>

                <div class="link-filters">
                    <label>
                        <input type="checkbox" id="filterAmount" checked onchange="refreshCandidates()">
                        Mesmo valor
                    </label>
                    <label>
                        <input type="checkbox" id="filterDate" checked onchange="refreshCandidates()">
                        Mesma data
                    </label>
                    <label>
                        Carteira:
                        <select id="filterWallet" onchange="refreshCandidates()">
                            <option value="">Todas</option>
                            <option th:each="w : ${wallets}"
                                    th:if="${w.id != entry.walletId}"
                                    th:value="${w.id}"
                                    th:text="${w.name}">
                            </option>
                        </select>
                    </label>
                </div>

                <div id="candidatesList" class="candidates-list">
                    <div th:replace="~{fragments/link-modal :: candidates}"></div>
                </div>
            </div>

            <div class="link-modal-footer">
                <button type="button" class="outline secondary" onclick="closeLinkModal()">Cancelar</button>
                <button type="button" id="linkButton" onclick="linkEntries()" disabled>
                    <i class="fa-solid fa-right-left"></i>
                    Vincular
                </button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var sourceEntryId = [[${entry.id}]];

        function refreshCandidates() {
            var filterAmount = document.getElementById('filterAmount').checked;
            var filterDate = document.getElementById('filterDate').checked;
            var walletId = document.getElementById('filterWallet').value;

            var url = '/entries/' + sourceEntryId + '/link/candidates?filterAmount=' + filterAmount + '&filterDate=' + filterDate;
            if (walletId) {
                url += '&walletId=' + walletId;
            }

            htmx.ajax('GET', url, {target: '#candidatesList', swap: 'innerHTML'});
        }

        function selectCandidate(radio) {
            document.querySelectorAll('.candidate-item').forEach(function(item) {
                item.classList.remove('selected');
            });
            radio.closest('.candidate-item').classList.add('selected');
            document.getElementById('linkButton').disabled = false;
        }

        function linkEntries() {
            var selected = document.querySelector('input[name="targetEntryId"]:checked');
            if (!selected) return;

            var formData = new FormData();
            formData.append('targetEntryId', selected.value);

            fetch('/entries/' + sourceEntryId + '/link', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRF-TOKEN': document.querySelector('meta[name="_csrf"]').content
                }
            }).then(function(response) {
                if (response.headers.get('HX-Redirect')) {
                    window.location.href = response.headers.get('HX-Redirect');
                } else {
                    return response.text();
                }
            }).then(function(html) {
                if (html) {
                    document.getElementById('linkError').innerHTML = html;
                }
            });
        }

        function closeLinkModal() {
            document.getElementById('linkModalContent').remove();
        }
    </script>
</div>

<div th:fragment="candidates">
    <div th:if="${#lists.isEmpty(candidates)}" class="no-candidates">
        <i class="fa-solid fa-search" style="font-size: 2rem; margin-bottom: 0.5rem;"></i>
        <p>Nenhum lancamento encontrado com os filtros atuais.</p>
        <small>Tente remover os filtros para ver mais opcoes.</small>
    </div>

    <div th:unless="${#lists.isEmpty(candidates)}">
        <div th:each="c : ${candidates}" class="candidate-item" onclick="this.querySelector('input').click()">
            <input type="radio" name="targetEntryId" th:value="${c.id}" onclick="selectCandidate(this)">
            <div class="candidate-info">
                <div>
                    <div class="candidate-desc" th:text="${c.description ?: '-'}">Descricao</div>
                    <div class="candidate-wallet" th:text="${c.walletName + ' - ' + #temporals.format(c.occurredAt, 'dd/MM/yyyy')}">Carteira - Data</div>
                </div>
                <div></div>
                <div class="candidate-amount" th:class="${c.direction.name() == 'IN' ? 'candidate-amount amount-in' : 'candidate-amount amount-out'}"
                     th:text="${(c.direction.name() == 'IN' ? '+' : '-') + 'R$ ' + #numbers.formatDecimal(c.amount / 100.0, 1, 'POINT', 2, 'COMMA')}">
                    R$ 100,00
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="error">
    <div class="link-error">
        <i class="fa-solid fa-circle-exclamation"></i>
        Erro ao carregar lancamento.
    </div>
</div>

<span th:fragment="errorMessage(message)" class="link-error">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span th:text="${message}">Erro</span>
</span>

</body>
</html>
