<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="form(wallets, expenseCategories, incomeCategories)">
    <div class="sidebar-header">
        <h2>Nova Transferência</h2>
        <button class="sidebar-close" onclick="closeSidebar()" type="button">&times;</button>
    </div>

    <form action="/transfers"
          method="post"
          hx-post="/transfers"
          hx-target="#sidebarContent"
          hx-swap="innerHTML">

        <div th:if="${errorMessage}" class="form-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span th:text="${errorMessage}">Erro</span>
        </div>

        <label for="occurredAt">
            Data
            <input type="date"
                   id="occurredAt"
                   name="occurredAt"
                   th:value="${formOccurredAt != null ? formOccurredAt : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                   required
                   autofocus>
        </label>

        <label for="amount">
            Valor (R$)
            <input type="text"
                   id="amount"
                   name="amount"
                   th:value="${formAmount}"
                   placeholder="Ex: 150,00"
                   required
                   inputmode="decimal">
        </label>

        <fieldset>
            <legend>Origem (saída)</legend>

            <label for="fromWalletId">
                Carteira
                <select id="fromWalletId" name="fromWalletId" required>
                    <option value="">Selecione a carteira...</option>
                    <option th:each="w : ${wallets}"
                            th:value="${w.id}"
                            th:text="${w.name}"
                            th:selected="${formFromWalletId == w.id}">
                    </option>
                </select>
            </label>

            <label for="fromCategoryId">
                Categoria
                <th:block th:replace="~{fragments/category-select :: select(categories=${expenseCategories}, selectId='fromCategoryId', selectedId=${formFromCategoryId}, placeholder='Selecione a categoria...', required=${true})}"/>
            </label>
        </fieldset>

        <fieldset>
            <legend>Destino (entrada)</legend>

            <label for="toWalletId">
                Carteira
                <select id="toWalletId" name="toWalletId" required>
                    <option value="">Selecione a carteira...</option>
                    <option th:each="w : ${wallets}"
                            th:value="${w.id}"
                            th:text="${w.name}"
                            th:selected="${formToWalletId == w.id}">
                    </option>
                </select>
            </label>

            <label for="toCategoryId">
                Categoria
                <th:block th:replace="~{fragments/category-select :: select(categories=${incomeCategories}, selectId='toCategoryId', selectedId=${formToCategoryId}, placeholder='Selecione a categoria...', required=${true})}"/>
            </label>
        </fieldset>

        <label for="description">
            Descrição (opcional)
            <input type="text"
                   id="description"
                   name="description"
                   th:value="${formDescription}"
                   placeholder="Ex: Resgate investimento, Aporte mensal...">
        </label>

        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
            <button type="button" class="outline secondary" onclick="closeSidebar()" style="flex: 1;">
                Cancelar
            </button>
            <button type="submit" style="flex: 1;">
                Criar
            </button>
        </div>
    </form>
</div>
</body>
</html>
