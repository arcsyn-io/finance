<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="row(wallet)" th:id="'wallet-row-' + ${wallet.id}">
    <td>
        <strong th:text="${wallet.name}">Nubank</strong>
    </td>
    <td>
        <span th:class="'badge badge-' + ${wallet.type.name().toLowerCase()}"
              th:text="${wallet.type.name() == 'CASH' ? 'Caixa' :
                         wallet.type.name() == 'CREDIT_CARD' ? 'Cartão de Crédito' :
                         wallet.type.name() == 'NEGOTIABLE_SECURITY' ? 'Título Negociável' :
                         wallet.type.name() == 'LONG_TERM' ? 'Longo Prazo' : 'Bem Patrimonial'}">Tipo</span>
    </td>
    <td>
        <span th:if="${wallet.active}" style="color: var(--pico-ins-color);">Ativa</span>
        <span th:unless="${wallet.active}" style="color: var(--pico-muted-color);">Inativa</span>
    </td>
    <td style="text-align: right;">
        <div style="display: flex; gap: 0.25rem; justify-content: flex-end;">
            <button class="icon-btn"
                    title="Editar"
                    th:attr="hx-get=@{/wallets/{id}/edit(id=${wallet.id})}"
                    hx-target="#sidebarContent"
                    hx-swap="innerHTML">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button th:if="${wallet.active}"
                    class="icon-btn icon-btn-danger"
                    title="Desativar"
                    th:attr="hx-post=@{/wallets/{id}/deactivate(id=${wallet.id})}"
                    hx-target="closest tr"
                    hx-swap="outerHTML">
                <i class="fa-solid fa-trash"></i>
            </button>
            <button th:unless="${wallet.active}"
                    class="icon-btn icon-btn-success"
                    title="Ativar"
                    th:attr="hx-post=@{/wallets/{id}/activate(id=${wallet.id})}"
                    hx-target="closest tr"
                    hx-swap="outerHTML">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>
    </td>
</tr>

<tr th:fragment="empty">
    <td colspan="4" style="text-align: center;">Erro ao processar carteira</td>
</tr>
</body>
</html>
