spring:
  datasource:
    url: jdbc:sqlite:data/finance.db
    driver-class-name: org.sqlite.JDBC

  jooq:
    sql-dialect: SQLITE

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
    prefix: classpath:/templates/

  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: strict
