<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<body>
<div th:fragment="content">
    <style>
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-cash { background: #3b82f633; color: #93c5fd; }
        .badge-credit_card { background: #ef444433; color: #f87171; }
        .badge-negotiable_security { background: #10b98133; color: #34d399; }
        .badge-long_term { background: #7c3aed33; color: #a78bfa; }
        .badge-asset { background: #f59e0b33; color: #fbbf24; }
    </style>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h1 style="margin-bottom: 0;">Carteiras</h1>
            <p style="margin: 0;"><small>Gerencie suas carteiras e contas</small></p>
        </div>
        <button hx-get="/wallets/new"
                hx-target="#sidebarContent"
                hx-swap="innerHTML">
            + Nova Carteira
        </button>
    </header>

    <div style="margin-bottom: 1rem;">
        <label class="toggle">
            <input type="checkbox"
                   th:checked="${showInactive}"
                   onchange="window.location.href = this.checked ? '/wallets?showInactive=true' : '/wallets'">
            <span class="toggle-switch"></span>
            <span class="toggle-label">Mostrar inativas</span>
        </label>
    </div>

    <figure>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th style="text-align: right;">Saldo</th>
                    <th>Status</th>
                    <th style="text-align: right;">Ações</th>
                </tr>
            </thead>
            <tbody id="wallets-table">
                <th:block th:each="wallet : ${wallets}">
                    <tr th:replace="~{fragments/wallet-row :: row(wallet=${wallet}, balance=${balances.getOrDefault(wallet.id, 0)})}"></tr>
                </th:block>
                <tr th:if="${#lists.isEmpty(wallets)}">
                    <td colspan="5" style="text-align: center; padding: 2rem;">
                        Nenhuma carteira encontrada.
                        <a href="#"
                           hx-get="/wallets/new"
                           hx-target="#sidebarContent"
                           hx-swap="innerHTML">Criar primeira carteira</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </figure>
</div>
</body>
</html>
