<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="row(category)" th:id="'category-row-' + ${category.id}">
    <td>
        <strong th:text="${category.name}">Alimentação</strong>
    </td>
    <td>
        <span th:class="${category.type.name() == 'INCOME' ? 'badge-income' : 'badge-expense'}"
              th:text="${category.type.name() == 'INCOME' ? 'Receita' : 'Despesa'}">Despesa</span>
    </td>
    <td>
        <span th:if="${category.active}" style="color: var(--pico-ins-color);">Ativa</span>
        <span th:unless="${category.active}" style="color: var(--pico-muted-color);">Inativa</span>
    </td>
    <td style="text-align: right;">
        <div style="display: flex; gap: 0.25rem; justify-content: flex-end;">
            <button class="icon-btn"
                    title="Editar"
                    th:attr="hx-get=@{/categories/{id}/edit(id=${category.id})}"
                    hx-target="#sidebarContent"
                    hx-swap="innerHTML">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button th:if="${category.active}"
                    class="icon-btn icon-btn-danger"
                    title="Desativar"
                    th:attr="hx-post=@{/categories/{id}/deactivate(id=${category.id})}"
                    hx-target="closest tr"
                    hx-swap="outerHTML">
                <i class="fa-solid fa-trash"></i>
            </button>
            <button th:unless="${category.active}"
                    class="icon-btn icon-btn-success"
                    title="Ativar"
                    th:attr="hx-post=@{/categories/{id}/activate(id=${category.id})}"
                    hx-target="closest tr"
                    hx-swap="outerHTML">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>
    </td>
</tr>

<tr th:fragment="empty">
    <td colspan="4" style="text-align: center;">Erro ao processar categoria</td>
</tr>
</body>
</html>
